<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --gold: #e8c472; --gold2: #f5dfa0;
  --rose: #d4607a; --rose2: #f0a0b8;
  --deep: #0d0618;
}
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Jost',sans-serif;
  background:var(--deep); color:#fef6e8;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}

/* BG */
.orb {
  position:fixed; border-radius:50%;
  filter:blur(80px); opacity:.35;
  animation:drift var(--t) ease-in-out infinite alternate;
  z-index:0;
}
@keyframes drift { from{transform:translate(0,0)} to{transform:translate(var(--dx),var(--dy))} }
#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.star {
  position:absolute; border-radius:50%;
  background:#fff; opacity:0;
  animation:twinkle var(--t) ease-in-out infinite var(--d);
}
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:var(--op);transform:scale(1)} }

/* CONTENT */
.content {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding:24px;
}
.label {
  font-size:11px; letter-spacing:6px; text-transform:uppercase;
  color:var(--gold); opacity:.7; margin-bottom:10px;
}
.title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(44px,12vw,84px); font-weight:300; line-height:1;
  background:linear-gradient(160deg,#fff 20%,var(--gold) 55%,var(--rose2) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px;
}
.name {
  font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:clamp(22px,6vw,42px);
  color:var(--gold); margin-bottom:44px;
}

/* ─── GIFT BOX ─── */
#giftWrap {
  position:relative;
  width:180px; height:200px;
  margin-bottom:28px;
  cursor:pointer;
  /* NO transform on this element ever */
}

/* shadow under */
#giftWrap::after {
  content:'';
  position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
  width:120px; height:16px;
  background:radial-gradient(ellipse,rgba(212,96,122,.5),transparent 70%);
  border-radius:50%;
  z-index:0;
}

/* BOX BODY — fixed, never moves */
.box-body {
  position:absolute;
  bottom:0; left:50%; transform:translateX(-50%);
  width:140px; height:110px;
  border-radius:10px;
  background:linear-gradient(155deg,#c94060 0%,#8c1a30 100%);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.15),
    0 16px 50px rgba(200,60,90,.5),
    0 4px 16px rgba(0,0,0,.5);
  z-index:2;
  overflow:hidden;
}
/* horizontal ribbon */
.box-body::after {
  content:'';
  position:absolute; top:50%; left:0; transform:translateY(-50%);
  width:100%; height:18px;
  background:linear-gradient(180deg,var(--gold2),var(--gold),var(--gold2));
  opacity:.9;
}
/* vertical ribbon */
.box-body::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:22px; height:100%;
  background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold2));
  opacity:.9;
  z-index:1;
}
.box-shine {
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.13) 0%,transparent 55%);
  border-radius:10px; pointer-events:none; z-index:3;
}

/* LID — only this moves */
.box-lid {
  position:absolute;
  bottom:102px; left:50%;
  /* transform-origin at bottom center so it pivots from where lid meets box */
  transform-origin: bottom center;
  transform: translateX(-50%) rotateX(0deg);
  width:150px; height:36px;
  border-radius:8px;
  background:linear-gradient(155deg,#e05070 0%,#a02040 100%);
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.2),
    0 6px 20px rgba(200,60,90,.5);
  z-index:5;
  overflow:hidden;
  /* 3d perspective applied on parent so we use perspective on wrapper */
  backface-visibility:hidden;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.6s ease 0.3s;
}
.box-lid::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:22px; height:100%;
  background:linear-gradient(90deg,var(--gold2),var(--gold),var(--gold2));
  opacity:.9;
}
.box-lid::after {
  content:'';
  position:absolute; top:50%; left:0; transform:translateY(-50%);
  width:100%; height:12px;
  background:linear-gradient(180deg,var(--gold2),var(--gold),var(--gold2));
  opacity:.9;
}

/* BOW — stays on top of lid */
.bow-wrap {
  position:absolute;
  bottom:130px; left:50%; transform:translateX(-50%);
  width:68px; height:48px;
  z-index:6;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.6s ease 0.2s;
  pointer-events:none;
}
.bow-loop {
  position:absolute; top:0;
  width:26px; height:24px; border-radius:50% 0 50% 0;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  box-shadow:inset 0 0 8px rgba(0,0,0,.2);
}
.bow-loop.l { left:0;  transform:rotate(-20deg); transform-origin:right bottom; }
.bow-loop.r { right:0; transform:rotate(20deg) scaleX(-1); transform-origin:left bottom; }
.bow-knot {
  position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
  width:13px; height:13px; border-radius:50%;
  background:linear-gradient(135deg,var(--gold2),#b8882a);
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.bow-tail { position:absolute; bottom:-6px; width:9px; height:18px; border-radius:0 0 50% 50%; background:linear-gradient(180deg,var(--gold),transparent); }
.bow-tail.l { left:28px; transform:rotate(-20deg); }
.bow-tail.r { right:28px; transform:rotate(20deg); }

/* glow inside box when opened */
.box-glow {
  position:absolute;
  bottom:0; left:50%; transform:translateX(-50%);
  width:140px; height:110px; border-radius:10px;
  background:radial-gradient(ellipse at 50% 0%,rgba(240,192,96,.9),transparent 65%);
  opacity:0; z-index:4; pointer-events:none;
  transition:opacity .6s .5s;
}

/* perspective wrapper for 3d lid */
#perspWrap {
  position:absolute; inset:0;
  perspective:500px;
  perspective-origin:50% 100%;
  pointer-events:none;
  z-index:5;
}

/* OPENED */
#giftWrap.opened .box-lid {
  transform: translateX(-50%) rotateX(-120deg) translateY(-10px);
  opacity:0;
}
#giftWrap.opened .bow-wrap {
  transform: translateX(-50%) translateY(-55px) rotate(-12deg);
  opacity:0;
}
#giftWrap.opened .box-glow { opacity:1; }

.hint {
  font-size:12px; letter-spacing:2px;
  color:rgba(255,255,255,.35);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }

/* MUSIC BTN */
#mBtn {
  position:fixed; top:16px; right:16px; z-index:999;
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(12px); cursor:pointer; font-size:18px;
  display:flex; align-items:center; justify-content:center;
  transition:transform .3s;
}
#mBtn.spin { animation:spinBtn 3s linear infinite; }
@keyframes spinBtn { to{transform:rotate(360deg)} }

/* CONFETTI */
.confetti {
  position:fixed; pointer-events:none; z-index:999;
  top:-10px; border-radius:var(--r);
  animation:cfall var(--dur) ease-in var(--del) forwards;
}
@keyframes cfall {
  0%  {opacity:1;transform:translateY(0) rotate(0)}
  100%{opacity:0;transform:translateY(110vh) rotate(var(--rot))}
}
</style>
</head>
<body>

<div class="orb" style="width:500px;height:500px;background:radial-gradient(#3d1060,transparent);top:-120px;left:-120px;--t:13s;--dx:60px;--dy:40px;"></div>
<div class="orb" style="width:400px;height:400px;background:radial-gradient(#7a1030,transparent);bottom:-100px;right:-80px;--t:16s;--dx:-50px;--dy:-30px;"></div>
<div id="stars"></div>

<iframe id="yt" src="https://www.youtube.com/embed/UbQgXeY94yc?autoplay=0&controls=0&loop=1&playlist=UbQgXeY94yc" allow="autoplay" style="display:none;width:0;height:0;border:none;"></iframe>
<button id="mBtn">🎵</button>

<div class="content">
  <p class="label">✦ sebuah kejutan ✦</p>
  <h1 class="title">Happy Birthday</h1>
  <h2 class="name">Nama Orang</h2>

  <div id="giftWrap" onclick="openGift()">
    <div class="box-glow"></div>
    <div class="box-body"><div class="box-shine"></div></div>
    <!-- perspective wrapper for 3d lid rotation -->
    <div id="perspWrap">
      <div class="box-lid"></div>
    </div>
    <div class="bow-wrap">
      <div class="bow-loop l"></div>
      <div class="bow-loop r"></div>
      <div class="bow-tail l"></div>
      <div class="bow-tail r"></div>
      <div class="bow-knot"></div>
    </div>
  </div>

  <p class="hint">✦ tap untuk membuka ✦</p>
</div>

<script>
// stars
const sc = document.getElementById('stars');
for(let i=0;i<55;i++){
  const s=document.createElement('div'); s.className='star';
  const sz=(Math.random()*2+1)+'px';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz};height:${sz};--t:${Math.random()*3+2}s;--d:${Math.random()*4}s;--op:${Math.random()*.5+.2};`;
  sc.appendChild(s);
}

// music
const mBtn=document.getElementById('mBtn'),yt=document.getElementById('yt');
let playing=false;
mBtn.addEventListener('click',()=>{
  playing=!playing;
  yt.src=playing?yt.src.replace('autoplay=0','autoplay=1'):yt.src.replace('autoplay=1','autoplay=0');
  mBtn.classList.toggle('spin',playing);
  mBtn.textContent=playing?'🎵':'🔇';
});

// open gift
let opened=false;
function openGift(){
  if(opened)return; opened=true;
  document.getElementById('giftWrap').classList.add('opened');
  spawnBurst(); 
  setTimeout(spawnConfetti,400);
  if(!playing){playing=true;yt.src=yt.src.replace('autoplay=0','autoplay=1');mBtn.classList.add('spin');}
  setTimeout(()=>{ window.location.href='pesan.html'; },1800);
}

function spawnBurst(){
  const rect=document.getElementById('giftWrap').getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/3;
  ['#e8c472','#f5dfa0','#d4607a','#f0a0b8','#fff','#c084fc'].forEach((col,idx)=>{
    for(let j=0;j<4;j++){
      const p=document.createElement('div');
      const angle=((idx*4+j)/24)*Math.PI*2;
      const dist=50+Math.random()*70;
      const sz=5+Math.random()*7;
      p.style.cssText=`position:fixed;z-index:999;pointer-events:none;width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'3px'};background:${col};left:${cx}px;top:${cy}px;transition:transform .7s cubic-bezier(.2,.8,.3,1),opacity .7s;`;
      document.body.appendChild(p);
      requestAnimationFrame(()=>{
        p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`;
        p.style.opacity='0';
      });
      setTimeout(()=>p.remove(),800);
    }
  });
}

function spawnConfetti(){
  const cols=['#e8c472','#d4607a','#c084fc','#60d0f0','#a0f060','#f0a0b8'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}vw;width:${5+Math.random()*7}px;height:${5+Math.random()*14}px;background:${cols[Math.floor(Math.random()*cols.length)]};--r:${Math.random()>.5?'50%':'2px'};--dur:${2+Math.random()*2}s;--del:${Math.random()*1.2}s;--rot:${Math.random()*720-360}deg;`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}
</script>
</body>
</html>
