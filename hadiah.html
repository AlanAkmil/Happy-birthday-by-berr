<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Hadiah 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#e8c472; --gold2:#f5dfa0; --rose:#d4607a; --rose2:#f0a0b8; --deep:#0d0618; }
html, body {
  width:100%; min-height:100%; overflow-y:auto;
  font-family:'Jost',sans-serif;
  background:var(--deep); color:#fef6e8;
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.35; animation:drift var(--t) ease-in-out infinite alternate; z-index:0; }
@keyframes drift { from{transform:translate(0,0)} to{transform:translate(var(--dx),var(--dy))} }
#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.star { position:absolute; border-radius:50%; background:#fff; opacity:0; animation:twinkle var(--t) ease-in-out infinite var(--d); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:var(--op);transform:scale(1)} }

.content {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding:44px 20px 80px;
  animation:fadeUp .8s ease forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

.title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,8vw,48px); font-weight:400;
  background:linear-gradient(135deg,#fff,var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px;
}
.sub {
  font-size:13px; color:rgba(255,255,255,.38);
  letter-spacing:.5px; margin-bottom:32px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px; width:100%; max-width:680px;
}
@media(max-width:480px){ .grid { grid-template-columns:1fr; gap:12px; } }

.card {
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  border-radius:18px; padding:22px 14px;
  text-align:center; text-decoration:none; color:inherit;
  display:block; position:relative; overflow:hidden;
  transition:transform .3s,border-color .3s,box-shadow .3s;
}
.card::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(232,196,114,.07),rgba(212,96,122,.07));
  opacity:0; transition:opacity .3s;
}
.card:hover { transform:translateY(-7px); border-color:rgba(232,196,114,.35); box-shadow:0 20px 50px rgba(232,196,114,.12); }
.card:hover::before { opacity:1; }

.emoji { font-size:38px; display:block; margin-bottom:10px; }
.cname {
  font-family:'Cormorant Garamond',serif;
  font-size:17px; margin-bottom:6px; color:#fff;
}
.cdesc {
  font-size:12px; color:rgba(255,255,255,.4);
  line-height:1.5; margin-bottom:14px;
}
.cbtn {
  display:inline-block; padding:8px 16px;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  border-radius:999px; font-size:12px; font-weight:500;
  color:var(--deep); letter-spacing:.3px;
}

/* dots */
#dots { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:100; }
.dot { width:6px; height:6px; border-radius:3px; background:rgba(255,255,255,.22); transition:width .3s,background .3s; }
.dot.on { width:20px; background:var(--gold); }

/* music */
#mBtn { position:fixed; top:16px; right:16px; z-index:999; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); backdrop-filter:blur(12px); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div class="orb" style="width:500px;height:500px;background:radial-gradient(#3d1060,transparent);top:-120px;left:-120px;--t:13s;--dx:60px;--dy:40px;"></div>
<div class="orb" style="width:400px;height:400px;background:radial-gradient(#7a1030,transparent);bottom:-100px;right:-80px;--t:16s;--dx:-50px;--dy:-30px;"></div>
<div id="stars"></div>

<iframe id="yt" src="https://www.youtube.com/embed/UbQgXeY94yc?autoplay=0&controls=0&loop=1&playlist=UbQgXeY94yc" allow="autoplay" style="display:none;width:0;height:0;border:none;"></iframe>
<button id="mBtn">🎵</button>

<div class="content">
  <h2 class="title">Pilih Hadiahmu 🎀</h2>
  <p class="sub">klik salah satu — gua yang bayar 😉</p>

  <div class="grid">
    <a class="card" href="LINK_SHOPEE_1" target="_blank" rel="noopener">
      <span class="emoji">🎧</span>
      <div class="cname">Hadiah 1</div>
      <div class="cdesc">Deskripsi singkat item Shopee pertama</div>
      <span class="cbtn">Pilih →</span>
    </a>
    <a class="card" href="LINK_SHOPEE_2" target="_blank" rel="noopener">
      <span class="emoji">👗</span>
      <div class="cname">Hadiah 2</div>
      <div class="cdesc">Deskripsi singkat item Shopee kedua</div>
      <span class="cbtn">Pilih →</span>
    </a>
    <a class="card" href="LINK_SHOPEE_3" target="_blank" rel="noopener">
      <span class="emoji">🌸</span>
      <div class="cname">Hadiah 3</div>
      <div class="cdesc">Deskripsi singkat item Shopee ketiga</div>
      <span class="cbtn">Pilih →</span>
    </a>
  </div>
</div>

<div id="dots">
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot on"></div>
</div>

<script>
const sc=document.getElementById('stars');
for(let i=0;i<55;i++){const s=document.createElement('div');s.className='star';const sz=(Math.random()*2+1)+'px';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz};height:${sz};--t:${Math.random()*3+2}s;--d:${Math.random()*4}s;--op:${Math.random()*.5+.2};`;sc.appendChild(s);}

const mBtn=document.getElementById('mBtn'),yt=document.getElementById('yt');
let playing=false;
mBtn.addEventListener('click',()=>{playing=!playing;yt.src=playing?yt.src.replace('autoplay=0','autoplay=1'):yt.src.replace('autoplay=1','autoplay=0');mBtn.textContent=playing?'🎵':'🔇';});
</script>
</body>
</html>
