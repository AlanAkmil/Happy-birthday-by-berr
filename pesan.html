<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Spesial 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --gold:#e8c472; --gold2:#f5dfa0; --rose:#d4607a; --rose2:#f0a0b8; --deep:#0d0618; }
html, body {
  width:100%; height:100%; overflow:hidden;
  font-family:'Jost',sans-serif;
  background:var(--deep); color:#fef6e8;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:.35; animation:drift var(--t) ease-in-out infinite alternate; z-index:0; }
@keyframes drift { from{transform:translate(0,0)} to{transform:translate(var(--dx),var(--dy))} }
#stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
.star { position:absolute; border-radius:50%; background:#fff; opacity:0; animation:twinkle var(--t) ease-in-out infinite var(--d); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.5)} 50%{opacity:var(--op);transform:scale(1)} }

/* page enter animation */
.content {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  padding:32px 24px; width:100%; max-width:540px;
  animation:fadeUp .8s ease forwards;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }

.eyebrow {
  font-size:11px; letter-spacing:5px; text-transform:uppercase;
  color:var(--gold); opacity:.7; margin-bottom:24px;
}

.card {
  width:100%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(20px);
  border-radius:22px; padding:36px 28px;
  position:relative; overflow:hidden;
  margin-bottom:28px;
}
.card::before {
  content:'"'; position:absolute; top:-28px; left:10px;
  font-family:'Cormorant Garamond',serif; font-size:170px; line-height:1;
  color:rgba(232,196,114,.07); pointer-events:none;
}
.gold-line {
  width:36px; height:2px;
  background:linear-gradient(90deg,var(--gold),var(--rose));
  margin:0 auto 20px; border-radius:2px;
}
.msg {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:clamp(17px,4vw,22px); line-height:1.9;
  color:rgba(255,255,255,.82);
}
.sig {
  margin-top:22px; font-size:13px;
  letter-spacing:1px; color:var(--gold); opacity:.8;
}

.btn {
  padding:14px 40px;
  background:linear-gradient(135deg,var(--gold),var(--rose));
  border:none; border-radius:999px;
  font-family:'Jost',sans-serif; font-size:14px; font-weight:500;
  color:var(--deep); letter-spacing:.5px; cursor:pointer;
  box-shadow:0 8px 30px rgba(232,196,114,.25);
  transition:transform .2s,box-shadow .2s;
  text-decoration:none; display:inline-block;
}
.btn:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(232,196,114,.35); }

/* dots */
#dots { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:100; }
.dot { width:6px; height:6px; border-radius:3px; background:rgba(255,255,255,.22); transition:width .3s,background .3s; }
.dot.on { width:20px; background:var(--gold); }

/* music */
#mBtn { position:fixed; top:16px; right:16px; z-index:999; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); backdrop-filter:blur(12px); cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div class="orb" style="width:500px;height:500px;background:radial-gradient(#3d1060,transparent);top:-120px;left:-120px;--t:13s;--dx:60px;--dy:40px;"></div>
<div class="orb" style="width:400px;height:400px;background:radial-gradient(#7a1030,transparent);bottom:-100px;right:-80px;--t:16s;--dx:-50px;--dy:-30px;"></div>
<div id="stars"></div>

<iframe id="yt" src="https://www.youtube.com/embed/UbQgXeY94yc?autoplay=0&controls=0&loop=1&playlist=UbQgXeY94yc" allow="autoplay" style="display:none;width:0;height:0;border:none;"></iframe>
<button id="mBtn">🎵</button>

<div class="content">
  <p class="eyebrow">💌 pesan spesial untukmu</p>
  <div class="card">
    <div class="gold-line"></div>
    <p class="msg">
      Semoga hari ini dan seterusnya<br>
      selalu dipenuhi kebahagiaan,<br>
      kesehatan, dan semua hal baik<br>
      yang kamu layak dapatkan.<br><br>
      Makasih udah jadi bagian<br>
      dari hari-hariku yang berarti.<br>
      Selamat ulang tahun! 🎂
    </p>
    <p class="sig">— dengan sayang 💛</p>
  </div>
  <a class="btn" href="hadiah.html">Lihat Hadiahmu 🎁</a>
</div>

<div id="dots">
  <div class="dot"></div>
  <div class="dot on"></div>
  <div class="dot"></div>
</div>

<script>
const sc=document.getElementById('stars');
for(let i=0;i<55;i++){const s=document.createElement('div');s.className='star';const sz=(Math.random()*2+1)+'px';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz};height:${sz};--t:${Math.random()*3+2}s;--d:${Math.random()*4}s;--op:${Math.random()*.5+.2};`;sc.appendChild(s);}

const mBtn=document.getElementById('mBtn'),yt=document.getElementById('yt');
let playing=false;
mBtn.addEventListener('click',()=>{playing=!playing;yt.src=playing?yt.src.replace('autoplay=0','autoplay=1'):yt.src.replace('autoplay=1','autoplay=0');mBtn.textContent=playing?'🎵':'🔇';});
</script>
</body>
</html>
